# Pull Request ごとに GHCR へプレビューイメージを公開する（レビュアーが pull 可能）。
# タグ例: ghcr.io/<owner>/docker-acms/acms:8.3-<PR番号>
# フォークからの PR は GITHUB_TOKEN に packages:write が無いため、ビルド検証のみ。
name: Build preview images (PR)

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'entrypoint.sh'
      - 'config/**'
      - 'docker-bake.hcl'
      - '.github/workflows/pr-preview.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: Build preview (bake matrix)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      # 同一リポジトリの PR のみ GHCR へ push（フォークは検証のみ）
      IS_INTERNAL: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
      # bake の HCL 変数は同名の環境変数で上書きできる
      REGISTRY: ghcr.io/${{ github.repository_owner }}/docker-acms
      PR_TAG: -${{ github.event.number }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Login to GHCR
        if: ${{ env.IS_INTERNAL == 'true' }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (push preview when internal)
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          source: .
          push: ${{ env.IS_INTERNAL == 'true' }}
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
