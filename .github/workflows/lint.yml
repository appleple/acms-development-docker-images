# GitHub Actions ワークフローの静的検査（actionlint）。YAML/式/シェルの事故を防ぐ。
name: Lint workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches:
      - master
    paths:
      - '.github/workflows/**'

permissions: {}

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@50842263c20a7c46bd0065b9e624d3c569db061e # v1.73.0
        with:
          reporter: github-check
